<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>
 <style>
        body {
            margin: 0;
            height: 100vh;
            position: relative;
        }

        /* Center the box */
        .box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 2px solid black;

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Center the text inside the box */
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: purple;
        }
    </style>
<body>
	<!-- the entire body must be written by student -->

	  <div class="box">
        <div class="text">This is center.</div>
    </div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
